name: CI/CD

# Test on every push/PR; build images on every run; publish + deploy only on main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write # required for the push job to publish to GHCR

env:
  REGISTRY: ghcr.io

jobs:
  # ─── 1. TEST ────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Backend — install & test
        working-directory: backend
        run: |
          npm ci
          npm test

      - name: Frontend — install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  # ─── 2. BUILD (verify both images build; no push) ───────────────
  build:
    name: Build image (${{ matrix.service.name }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: backend, context: ./backend }
          - { name: frontend, context: ./frontend }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: false
          tags: tank-db-${{ matrix.service.name }}:ci
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

  # ─── 3. PUSH (publish images to GHCR; main only) ────────────────
  push:
    name: Push image (${{ matrix.service.name }})
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: backend, context: ./backend }
          - { name: frontend, context: ./frontend }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # GHCR image paths must be lowercase; the repo owner ("HarelValfish")
      # is mixed-case, so normalize it here.
      - name: Resolve lowercase image name
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=${REGISTRY}/${owner}/tank-db-${{ matrix.service.name }}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

  # ─── 4. DEPLOY (placeholder; main only, gated by environment) ───
  deploy:
    name: Deploy
    needs: push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Set required reviewers on the "production" environment in repo settings
    # to turn this into a manual approval gate before anything ships.
    environment: production
    steps:
      - name: Deploy (placeholder)
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "🚀  TODO: wire up the real deployment."
          echo ""
          echo "Images published to GHCR by the 'push' job:"
          echo "  ${REGISTRY}/${owner}/tank-db-backend:latest"
          echo "  ${REGISTRY}/${owner}/tank-db-frontend:latest"
          echo ""
          echo "Fill in one of these (and add the matching repo secrets):"
          echo "  • SSH to a server:  ssh \$HOST 'cd /app && docker compose pull && docker compose up -d'"
          echo "  • PaaS deploy hook: curl -fsSL -X POST \"\$DEPLOY_HOOK_URL\""
          echo ""
          echo "Placeholder deploy succeeded — nothing was shipped."
