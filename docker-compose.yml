# Full stack in containers: MongoDB + API + nginx-served frontend.
#
# Local build & run:   docker compose up --build
#   → frontend at http://localhost:8080
#
# To run the published GHCR images instead of building locally, replace each
# `build:` block with e.g. `image: ghcr.io/harelvalfish/tank-db-backend:latest`.

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    # Not published to the host by default; only the backend reaches it over
    # the internal network. Uncomment to inspect from the host:
    # ports:
    #   - "27017:27017"

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      # Point at the local mongo service. Swap for an Atlas URI in production.
      MONGO_URI: mongodb://mongo:27017/tank_database
      PORT: "5001"
      CLIENT_ORIGIN: http://localhost:8080
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongo-data:
