apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: tank-db
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 769638986113.dkr.ecr.us-east-1.amazonaws.com/tank-db-backend:latest
          ports:
            - containerPort: 5001
          env:
            - name: PORT
              value: "5001"
            - name: NODE_ENV
              value: production
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: MONGO_URI
            - name: CLIENT_ORIGIN
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: CLIENT_ORIGIN
            - name: ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: ADMIN_KEY
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
